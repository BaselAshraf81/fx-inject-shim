<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fx-inject-shim Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 220px;
      padding: 12px 16px;
      margin: 0;
    }
    h3 { margin: 0 0 10px; font-size: 14px; }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #0060df;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #0250bb; }
    button:disabled { background: #999; cursor: default; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }
    #status.error { color: #d70022; }
    #status.ok    { color: #058b00; }
  </style>
</head>
<body>
  <h3>fx-inject-shim Demo</h3>
  <button id="btn">Highlight Paragraphs</button>
  <div id="status"></div>

  <!--
    Load the shim FIRST, before popup.js.
    This patches browser.tabs.executeScript in-place so popup.js needs
    zero changes from its pre-Firefox-149 form.
  -->
  <script src="vendor/shim-page.js"></script>
  <script src="popup.js"></script>
</body>
</html>
